aid: crane
name: Crane
x-type: company
description: >-
  Crane Co. (NYSE: CR) and its sister company Crane NXT (NYSE: CXT) are
  industrial manufacturing companies that resulted from the 2023 split of the
  legacy Crane Holdings, Co. Crane Co. is a diversified manufacturer of highly
  engineered industrial products serving aerospace and electronics, process
  flow technologies, and engineered materials markets. Crane NXT is a global
  leader in trusted technology solutions for payment, security, and authentication
  including currency, banknote, and authentication products. No public APIs or
  developer portals are published; integrations with industrial customers are
  arranged through enterprise channels.
